      type: object
      properties:
        body: { type: string, maxLength: 5000, nullable: true }
        attachments:
          type: array
          maxItems: 5
          items: { type: string, format: binary }

    Message:
      type: object
      properties:
        id: { type: integer, format: int64 }
        conversation_id: { type: integer, format: int64 }
        sender: { $ref: "#/components/schemas/UserSummary" }
        body: { type: string, nullable: true }
        message_type: { type: string, enum: [text, image, file, system] }
        status: { $ref: "#/components/schemas/MessageStatus" }
        attachments:
          type: array
          items: { $ref: "#/components/schemas/MediaFile" }
