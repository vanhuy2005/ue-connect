      type: object
      properties:
        id: { type: integer, format: int64 }
        actor: { $ref: "#/components/schemas/UserSummary" }
        actor_type: { type: string }
        action_key: { type: string }
        target_type: { type: string }
        target_id: { type: integer, format: int64, nullable: true }
        context_type: { type: string, nullable: true }
        context_id: { type: integer, format: int64, nullable: true }
        reason: { type: string, nullable: true }
        metadata:
          type: object
          additionalProperties: true
        created_at: { type: string, format: date-time }

    AnalyticsEventCreate:
      type: object
      required: [event_name, occurred_at]
      properties:
        event_name:
          type: string
          enum: [user_registered, verification_submitted, verification_approved, profile_completed, post_created, comment_created, greeting_sent, greeting_accepted, message_sent, mentor_request_created, community_join_requested, report_submitted, moderation_action_taken, ui_interaction]
        target_type: { type: string, nullable: true }
        target_id: { type: integer, format: int64, nullable: true }
        context_type: { type: string, nullable: true }
        context_id: { type: integer, format: int64, nullable: true }
        properties:
          type: object
          additionalProperties: true
          description: Must not include sensitive message/report/evidence/private data.
        occurred_at: { type: string, format: date-time }

webhooks:
  messageSent:
    post:
      tags: [Realtime]
      summary: Realtime event contract for MessageSent
      description: Broadcast over private conversation channel after database commit.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [event, conversation_id, message]
              properties:
                event: { type: string, const: MessageSent }
                conversation_id: { type: integer, format: int64 }
                message: { $ref: "#/components/schemas/Message" }
      responses:
        "200":
          description: Client receives event.

  notificationCreated:
    post:
      tags: [Realtime]
      summary: Realtime event contract for NotificationCreated
      description: Broadcast over private user notification channel after database commit.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [event, notification]
              properties:
                event: { type: string, const: NotificationCreated }
