        show_cohort: { $ref: "#/components/schemas/Visibility" }
        show_bio: { $ref: "#/components/schemas/Visibility" }
        show_skills: { $ref: "#/components/schemas/Visibility" }
        show_interests: { $ref: "#/components/schemas/Visibility" }
        show_social_links: { $ref: "#/components/schemas/Visibility" }
        show_career_info: { $ref: "#/components/schemas/Visibility" }
        show_mentor_status: { $ref: "#/components/schemas/Visibility" }
        discoverable: { type: boolean }
        allow_greetings: { type: boolean }
        allow_messages_from_connections: { type: boolean }
        show_read_receipts: { type: boolean }

    MediaFile:
      type: object
      properties:
        id: { type: integer, format: int64 }
