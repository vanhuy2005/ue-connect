        slug: { type: string }
        description: { type: string, nullable: true }
        channel_type: { type: string, enum: [feed, chat, resources, announcements, events] }
        visibility: { type: string }
        status: { type: string, enum: [active, readonly, archived, hidden] }
        sort_order: { type: integer }

