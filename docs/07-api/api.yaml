        current_organization: { type: string, nullable: true }
        industry: { type: string, nullable: true }
        career_summary: { type: string, nullable: true }
        willing_to_mentor: { type: boolean }

    AdvisorProfile:
      type: object
      nullable: true
      properties:
        department: { type: string, nullable: true }
        title: { type: string, nullable: true }
        office_location: { type: string, nullable: true }
        advising_areas: { type: string, nullable: true }

    ProfileUpdateRequest:
      type: object
      properties:
        display_name: { type: string, maxLength: 255 }
        bio: { type: string, maxLength: 2000 }
        faculty_id: { type: integer, format: int64 }
        academic_program_id: { type: integer, format: int64 }
        cohort: { type: string, maxLength: 50 }
        current_year: { type: integer, minimum: 1, maximum: 8 }
        class_name: { type: string, maxLength: 100 }
        learning_goals: { type: string, maxLength: 2000 }
        career_orientation: { type: string, maxLength: 2000 }
        skills:
          type: array
          items: { type: string, maxLength: 100 }
        interests:
          type: array
          items: { type: string, maxLength: 100 }

    ProfilePrivacySettings:
      type: object
