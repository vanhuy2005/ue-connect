components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: ueconnect_session
      description: Laravel session cookie for same-origin web/PWA requests.
    csrfToken:
      type: apiKey
      in: header
      name: X-CSRF-TOKEN
      description: CSRF token required for state-changing same-origin requests.
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum
      description: Future token auth for mobile/native clients.

  parameters:
    Page:
      name: page
      in: query
      schema: { type: integer, minimum: 1, default: 1 }
    PerPage:
      name: per_page
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    Cursor:
      name: cursor
      in: query
      schema: { type: string, nullable: true }
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
    StatusFilter:
      name: filter[status]
      in: query
      schema: { type: string }
    UserId:
      name: user_id
      in: path
      required: true
      schema: { type: integer, format: int64 }
    MediaFileId:
      name: media_file_id
      in: path
      required: true
      schema: { type: integer, format: int64 }
    VerificationRequestId:
      name: verification_request_id
      in: path
      required: true
      schema: { type: integer, format: int64 }
    EvidenceId:
      name: evidence_id
      in: path
      required: true
      schema: { type: integer, format: int64 }
    PostId:
      name: post_id
      in: path
      required: true
      schema: { type: integer, format: int64 }
    CommentId:
      name: comment_id
      in: path
      required: true
      schema: { type: integer, format: int64 }
    GreetingId:
      name: greeting_id
      in: path
      required: true
      schema: { type: integer, format: int64 }
    ConnectionId:
      name: connection_id
      in: path
      required: true
      schema: { type: integer, format: int64 }
    ConversationId:
      name: conversation_id
      in: path
      required: true
      schema: { type: integer, format: int64 }
    MessageId:
      name: message_id
      in: path
      required: true
      schema: { type: integer, format: int64 }
    NotificationId:
      name: notification_id
      in: path
      required: true
      schema: { type: integer, format: int64 }
    MentorRequestId:
      name: mentor_request_id
      in: path
      required: true
      schema: { type: integer, format: int64 }
    CommunityId:
      name: community_id
      in: path
      required: true
      schema: { type: integer, format: int64 }

  responses:
    GenericSuccess:
      description: Generic successful operation.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/SuccessEnvelope" }
          example:
            success: true
            data: {}
            message: "Thao tác thành công."
            meta: {}
    ValidationError:
      description: Validation failed.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
          example:
            success: false
            error:
              code: VALIDATION_FAILED
              message: "Vui lòng kiểm tra lại thông tin."
              details:
                email: ["Email phải thuộc tên miền hcmue.edu.vn."]
            meta: {}
    UnauthenticatedError:
      description: Unauthenticated.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
          example:
            success: false
            error:
              code: AUTH_UNAUTHENTICATED
              message: "Bạn cần đăng nhập để tiếp tục."
              details: {}
            meta: {}
    InvalidCredentialsError:
      description: Invalid credentials.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
          example:
            success: false
            error:
              code: AUTH_INVALID_CREDENTIALS
              message: "Email hoặc mật khẩu không đúng."
              details: {}
            meta: {}
    PermissionDeniedError:
      description: Permission denied.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
          example:
            success: false
            error:
              code: PERMISSION_DENIED
              message: "Bạn không có quyền thực hiện thao tác này."
              details: {}
            meta: {}
    AccountGateError:
      description: Account gate blocked.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
          example:
            success: false
            error:
              code: ACCOUNT_NOT_VERIFIED
              message: "Bạn cần xác thực tài khoản trước khi sử dụng tính năng này."
              details:
                next_route: "/app/verification"
            meta: {}
    NotFoundError:
      description: Resource not found or hidden.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
          example:
            success: false
            error:
              code: RESOURCE_NOT_FOUND
              message: "Không tìm thấy dữ liệu."
              details: {}
            meta: {}
    ConflictError:
      description: Resource conflict.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
          example:
            success: false
            error:
              code: STALE_RESOURCE_CONFLICT
              message: "Dữ liệu đã thay đổi. Vui lòng tải lại trước khi xử lý."
              details:
                current_status: approved
            meta: {}

  schemas:
    SuccessEnvelope:
      type: object
      required: [success, data, message, meta]
      properties:
        success: { type: boolean, const: true }
        data: {}
        message: { type: string, example: "Thao tác thành công." }
        meta:
          type: object
          additionalProperties: true

    ErrorEnvelope:
      type: object
      required: [success, error, meta]
      properties:
        success: { type: boolean, const: false }
        error: { $ref: "#/components/schemas/ApiError" }
        meta:
          type: object
          additionalProperties: true

    ApiError:
      type: object
      required: [code, message, details]
      properties:
        code: { type: string, example: VALIDATION_FAILED }
        message: { type: string }
        details:
          type: object
          additionalProperties: true

    PageMeta:
      type: object
      properties:
        pagination:
          type: object
          properties:
            page: { type: integer, example: 1 }
            per_page: { type: integer, example: 20 }
            total: { type: integer, example: 125 }
            last_page: { type: integer, example: 7 }
            has_more: { type: boolean, example: true }

    CursorMeta:
      type: object
      properties:
        cursor:
          type: object
          properties:
            next: { type: string, nullable: true }
            previous: { type: string, nullable: true }
            has_more: { type: boolean }

    AccountStatus:
      type: string
      enum: [active, restricted, suspended, banned, deleted]

    VerificationStatus:
      type: string
      enum: [draft, submitted, pending_review, under_review, needs_more_information, approved, rejected, conflict, suspicious, expired, cancelled]

    ProfileStatus:
      type: string
      enum: [incomplete, ready, restricted, hidden]

    RoleType:
      type: string
      enum: [student, alumni, advisor, admin]

    Visibility:
      type: string
      enum: [public, hcmue_only, connections_only, community_members_only, private]

    PostVisibility:
      type: string
      enum: [public_hcmue, connections, community, private, admin_only]

    PostStatus:
      type: string
      enum: [draft, published, hidden_by_moderation, removed_by_moderation, archived, deleted]

    GreetingStatus:
      type: string
      enum: [pending, accepted, declined, cancelled, expired, blocked, reported]

    ConnectionStatus:
      type: string
      enum: [active, blocked, removed, restricted]

    ConversationType:
      type: string
      enum: [direct, mentor_request, community_chat, system]

    ConversationStatus:
      type: string
      enum: [active, archived, blocked, restricted, deleted]

    MessageStatus:
      type: string
      enum: [sending, sent, delivered, read, edited, deleted, failed, hidden_by_moderation, removed_by_moderation]

    MentorStatus:
      type: string
      enum: [draft, pending_review, approved, rejected, suspended, revoked]

    MentorAvailabilityStatus:
      type: string
      enum: [available, limited, full, paused, unavailable]

    MentorRequestStatus:
      type: string
      enum: [draft, pending, needs_more_information, updated_by_student, accepted, declined, cancelled_by_student, expired, completed, reported, restricted]

    Urgency:
      type: string
      enum: [low, normal, high, urgent]

    CommunityType:
      type: string
      enum: [club, faculty, academic, career, mentor, interest, official, other]

    CommunityStatus:
      type: string
      enum: [draft, pending_review, active, inactive, suspended, archived, hidden_by_moderation]

    CommunityVisibility:
      type: string
      enum: [public, hcmue_only, private, hidden]

    JoinPolicy:
      type: string
      enum: [open, approval_required, invite_only, closed]

    MembershipStatus:
      type: string
      enum: [active, pending, removed, left, banned, muted]

    ReportReason:
      type: string
      enum: [spam, harassment, impersonation, sexual_or_dating_content, copyright_violation, personal_information_leak, scam_fraud, hate_or_offensive_language, politically_sensitive_content, other]

    ReportStatus:
      type: string
      enum: [submitted, queued, in_review, resolved, dismissed, duplicate, withdrawn]

    ModerationCaseStatus:
      type: string
      enum: [queued, in_review, action_required, actioned, dismissed, escalated, appealed, resolved, closed]

    ModerationActionKey:
      type: string
      enum: [dismiss, hide, delete, restore, warn, suspend, ban, escalate, resolve]

    Priority:
      type: string
      enum: [low, normal, high, urgent]

    Faculty:
      type: object
      required: [id, name, slug, status]
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        slug: { type: string }
        description: { type: string, nullable: true }
        status: { type: string, enum: [active, inactive, archived] }

    AcademicProgram:
      type: object
      required: [id, faculty_id, name, slug, degree_level, status]
      properties:
        id: { type: integer, format: int64 }
        faculty_id: { type: integer, format: int64 }
        name: { type: string }
        slug: { type: string }
        degree_level: { type: string, enum: [undergraduate, postgraduate, certificate, other] }
        description: { type: string, nullable: true }
        status: { type: string, enum: [active, inactive, archived] }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          pattern: "^[^@]+@hcmue\\.edu\\.vn$"
        password: { type: string, minLength: 8 }
        remember: { type: boolean, default: false }

    AuthSession:
      type: object
      properties:
        user: { $ref: "#/components/schemas/UserAccount" }
        account_gate: { $ref: "#/components/schemas/AccountGate" }

    UserAccount:
      type: object
      properties:
        id: { type: integer, format: int64 }
        email: { type: string, format: email }
        account_status: { $ref: "#/components/schemas/AccountStatus" }
        email_verified_at: { type: string, format: date-time, nullable: true }

    AccountGate:
      type: object
      properties:
        next_route: { type: string, example: /app/home }
        reason:
          type: string
          enum: [account_restricted, account_suspended, account_banned, not_verified, profile_incomplete, verified_and_ready, admin_route_allowed]
        message: { type: string, nullable: true }

    Me:
      type: object
      properties:
        user: { $ref: "#/components/schemas/UserAccount" }
        profile: { $ref: "#/components/schemas/ProfileSummary" }
        permissions:
          type: array
          items: { type: string }
        account_gate: { $ref: "#/components/schemas/AccountGate" }

    UserSummary:
      type: object
      properties:
        id: { type: integer, format: int64 }
        display_name: { type: string }
        avatar_url: { type: string, nullable: true }
