        visibility: { $ref: "#/components/schemas/CommunityVisibility" }
        join_policy: { $ref: "#/components/schemas/JoinPolicy" }

    CommunityUpdateRequest:
      allOf:
        - $ref: "#/components/schemas/CommunityCreateRequest"

    CommunityMember:
      type: object
      nullable: true
      properties:
        id: { type: integer, format: int64 }
        user: { $ref: "#/components/schemas/UserSummary" }
