        evidence_type:
          type: string
          enum: [student_card, admission_letter, transcript, graduation_certificate, advisor_document, email_evidence, other]
        user_note: { type: string, minLength: 1, maxLength: 1000 }
        file:
          type: string
          format: binary
          nullable: true
          description: jpg/jpeg/png/pdf/webp, max 5MB.
        evidence_link:
          type: string
          format: uri
          nullable: true

    VerificationEvidence:
      type: object
      properties:
        id: { type: integer, format: int64 }
        evidence_type: { type: string }
        user_note: { type: string }
        evidence_link: { type: string, nullable: true }
        status:
          type: string
          enum: [uploaded, accepted, rejected, needs_more_information, archived]
        media: { $ref: "#/components/schemas/MediaFile" }
        preview_url: { type: string, nullable: true }

    PostCreateRequest:
      type: object
      required: [body, visibility]
      properties:
        body: { type: string, maxLength: 5000 }
        visibility: { $ref: "#/components/schemas/PostVisibility" }
        community_id: { type: integer, format: int64, nullable: true }
        images:
          type: array
          maxItems: 4
          items: { type: string, format: binary }

    Post:
      type: object
      properties:
        id: { type: integer, format: int64 }
