    VerificationRequestCreate:
      type: object
      required: [role_requested, submitted_name, submitted_email]
      properties:
        role_requested: { type: string, enum: [student, alumni, advisor] }
        submitted_name: { type: string, maxLength: 255 }
        submitted_student_code: { type: string, maxLength: 50, nullable: true }
        submitted_faculty_id: { type: integer, format: int64, nullable: true }
        submitted_academic_program_id: { type: integer, format: int64, nullable: true }
        submitted_cohort: { type: string, maxLength: 50, nullable: true }
        submitted_email:
          type: string
          format: email
          pattern: "^[^@]+@hcmue\\.edu\\.vn$"
        submitted_note: { type: string, nullable: true }

    VerificationRequest:
      type: object
      properties:
        id: { type: integer, format: int64 }
        user_id: { type: integer, format: int64 }
        role_requested: { type: string, enum: [student, alumni, advisor] }
        status: { $ref: "#/components/schemas/VerificationStatus" }
        submitted_name: { type: string }
        submitted_student_code: { type: string, nullable: true }
        submitted_faculty: { $ref: "#/components/schemas/Faculty" }
        submitted_academic_program: { $ref: "#/components/schemas/AcademicProgram" }
        submitted_cohort: { type: string, nullable: true }
        submitted_email: { type: string, format: email }
        submitted_note: { type: string, nullable: true }
        evidences:
          type: array
          items: { $ref: "#/components/schemas/VerificationEvidence" }
        submitted_at: { type: string, format: date-time, nullable: true }
        reviewed_at: { type: string, format: date-time, nullable: true }
        expires_at: { type: string, format: date-time, nullable: true }

