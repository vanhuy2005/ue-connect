openapi: 3.1.0
info:
  title: UEConnect API
  version: 1.0.0
  summary: Enterprise OpenAPI / Swagger contract for UEConnect
  description: |
    UEConnect is a verified HCMUE-only campus social platform.

    This API contract covers the full UEConnect product surface:
    authentication, account gate, identity verification, evidence upload, profile,
    privacy, home feed, posts, comments, discovery, greeting, connection, messaging,
    notification, browser push, mentor matching, career pathway, community/club,
    resources, safety reporting, moderation, admin operations, audit log, analytics,
    media, and realtime recovery.

    Core rules:
    - Database is the source of truth.
    - Realtime events are delivery signals only.
    - All state-changing same-origin requests require CSRF.
    - All private data must be redacted by viewer context.
    - Admin mutations require permission, reason, state validation, and audit log.
    - API field names use snake_case to match Laravel and database conventions.
  contact:
    name: UEConnect Backend Team
    email: nguyen.van.quang.huy.2105@gmail.com
  license:
    name: Internal Educational Project

servers:
  - url: https://ueconnect.hcmue.edu.vn/api/v1
    description: Production
  - url: https://staging.ueconnect.hcmue.edu.vn/api/v1
    description: Staging
  - url: http://localhost:8000/api/v1
    description: Local development

tags:
  - name: System
    description: Health check and reference data.
  - name: Authentication
    description: Login, logout, password reset, account gate.
  - name: Current User
    description: Current user, own profile, privacy and settings.
  - name: Verification
    description: HCMUE identity verification and evidence review.
  - name: Media
    description: Avatar, post images, private evidence, message attachments and protected preview.
  - name: Feed
    description: Home feed and posts.
  - name: Comments
    description: Post comments and replies.
  - name: Discovery
    description: Profile discovery and recommendation pass.
  - name: Greeting
    description: Greeting request lifecycle.
  - name: Connection
    description: Accepted user connections.
  - name: Messaging
    description: Conversations, messages, read receipts, edit/delete, attachments.
  - name: Notifications
    description: In-app notification and browser push subscription.
  - name: Mentor
    description: Mentor profile, mentor access and mentor request lifecycle.
  - name: Career Pathway
    description: Faculties, programs, pathways, steps and resources.
  - name: Community
    description: Communities, clubs, members, join requests, channels and resources.
  - name: Safety
    description: Reports and blocking.
  - name: Admin
    description: Admin dashboard, verification review, moderation, users, permissions and audit.
  - name: Analytics
    description: Safe internal event tracking.
  - name: Realtime
    description: HTTP recovery endpoints and WebSocket event contracts.

security:
  - cookieAuth: []
  - bearerAuth: []

paths:
  /health:
    get:
      tags: [System]
      summary: Health check
      operationId: getHealth
      security: []
      responses:
        "200":
          description: API is healthy.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          status: { type: string, example: ok }
                          service: { type: string, example: ueconnect-api }

  /reference/faculties:
    get:
      tags: [System]
      summary: List faculties
      operationId: listFaculties
      parameters:
        - $ref: "#/components/parameters/StatusFilter"
      responses:
        "200":
          description: Faculty list.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/Faculty" }

  /reference/academic-programs:
    get:
      tags: [System]
      summary: List academic programs
      operationId: listAcademicPrograms
      parameters:
        - name: faculty_id
          in: query
          schema: { type: integer, format: int64 }
        - $ref: "#/components/parameters/StatusFilter"
      responses:
        "200":
          description: Program list.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/AcademicProgram" }

  /auth/login:
    post:
      tags: [Authentication]
      summary: Login with HCMUE email and password
      operationId: login
      security:
        - csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: Login successful.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/AuthSession" }
        "401": { $ref: "#/components/responses/InvalidCredentialsError" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /auth/logout:
    post:
      tags: [Authentication]
      summary: Logout current session
      operationId: logout
      security:
        - cookieAuth: []
        - csrfToken: []
      responses:
        "200": { $ref: "#/components/responses/GenericSuccess" }
        "401": { $ref: "#/components/responses/UnauthenticatedError" }

  /auth/account-status:
    get:
      tags: [Authentication]
      summary: Get current account gate status
      operationId: getAccountStatus
      responses:
        "200":
          description: Account gate decision.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/AccountGate" }

  /auth/forgot-password:
    post:
      tags: [Authentication]
      summary: Request password reset link
      operationId: forgotPassword
      security:
        - csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                  pattern: "^[^@]+@hcmue\\.edu\\.vn$"
      responses:
        "200": { $ref: "#/components/responses/GenericSuccess" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /auth/reset-password:
    post:
      tags: [Authentication]
      summary: Reset password
      operationId: resetPassword
      security:
        - csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, token, password, password_confirmation]
              properties:
                email: { type: string, format: email }
                token: { type: string }
                password: { type: string, minLength: 8 }
                password_confirmation: { type: string, minLength: 8 }
      responses:
        "200": { $ref: "#/components/responses/GenericSuccess" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /me:
    get:
      tags: [Current User]
      summary: Get current authenticated user
      operationId: getMe
      responses:
        "200":
          description: Current user.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Me" }
        "401": { $ref: "#/components/responses/UnauthenticatedError" }

  /me/profile:
    get:
      tags: [Current User]
      summary: Get current user's own profile
      operationId: getMyProfile
      responses:
        "200":
          description: Own profile.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/ProfileDetail" }
    patch:
      tags: [Current User]
      summary: Update current user's profile
      operationId: updateMyProfile
      security:
        - cookieAuth: []
        - csrfToken: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProfileUpdateRequest" }
      responses:
        "200":
          description: Profile updated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/ProfileDetail" }
        "403": { $ref: "#/components/responses/AccountGateError" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /me/privacy:
    get:
      tags: [Current User]
      summary: Get privacy settings
      operationId: getMyPrivacySettings
      responses:
        "200":
          description: Privacy settings.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/ProfilePrivacySettings" }
    patch:
      tags: [Current User]
      summary: Update privacy settings
      operationId: updateMyPrivacySettings
      security:
        - cookieAuth: []
        - csrfToken: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProfilePrivacySettings" }
      responses:
        "200":
          description: Privacy settings updated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/ProfilePrivacySettings" }

  /users/{user_id}:
    get:
      tags: [Current User]
      summary: Get public profile by user id
      operationId: getUserProfile
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: Viewer-context redacted profile.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/ProfileDetail" }
        "404": { $ref: "#/components/responses/NotFoundError" }

  /media/avatar:
    post:
      tags: [Media]
      summary: Upload current user's avatar
      operationId: uploadAvatar
      security:
        - cookieAuth: []
        - csrfToken: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary }
      responses:
        "201":
          description: Avatar uploaded.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/MediaFile" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /media/{media_file_id}/preview:
    get:
      tags: [Media]
      summary: Get protected preview metadata
      operationId: previewMediaFile
      parameters:
        - $ref: "#/components/parameters/MediaFileId"
      responses:
        "200":
          description: Preview metadata.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/MediaPreview" }
        "403": { $ref: "#/components/responses/PermissionDeniedError" }
        "404": { $ref: "#/components/responses/NotFoundError" }

  /verification/current:
    get:
      tags: [Verification]
      summary: Get current user's latest verification request
      operationId: getCurrentVerification
      responses:
        "200":
          description: Current verification request.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/VerificationRequest" }
        "404": { $ref: "#/components/responses/NotFoundError" }

  /verification/requests:
    post:
      tags: [Verification]
      summary: Create verification request draft
      operationId: createVerificationRequest
      security:
        - cookieAuth: []
        - csrfToken: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/VerificationRequestCreate" }
      responses:
        "201":
          description: Draft created.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/VerificationRequest" }
        "409": { $ref: "#/components/responses/ConflictError" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /verification/requests/{verification_request_id}:
    get:
      tags: [Verification]
      summary: Get verification request
      operationId: getVerificationRequest
      parameters:
        - $ref: "#/components/parameters/VerificationRequestId"
      responses:
        "200":
          description: Verification request.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/VerificationRequest" }
    patch:
      tags: [Verification]
      summary: Update verification draft or resubmission
      operationId: updateVerificationRequest
      security:
        - cookieAuth: []
        - csrfToken: []
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/VerificationRequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/VerificationRequestCreate" }
      responses:
        "200":
          description: Verification updated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/VerificationRequest" }

  /verification/requests/{verification_request_id}/submit:
    post:
      tags: [Verification]
      summary: Submit verification request for review
      operationId: submitVerificationRequest
      security:
        - cookieAuth: []
        - csrfToken: []
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/VerificationRequestId"
      responses:
        "200":
          description: Verification submitted.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/VerificationRequest" }
        "409": { $ref: "#/components/responses/ConflictError" }

  /verification/requests/{verification_request_id}/evidences:
    post:
      tags: [Verification, Media]
      summary: Upload verification evidence
      operationId: uploadVerificationEvidence
      security:
        - cookieAuth: []
        - csrfToken: []
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/VerificationRequestId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema: { $ref: "#/components/schemas/VerificationEvidenceUpload" }
      responses:
        "201":
          description: Evidence uploaded.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/VerificationEvidence" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /verification/evidences/{evidence_id}:
    delete:
      tags: [Verification, Media]
      summary: Delete evidence from editable verification request
      operationId: deleteVerificationEvidence
      security:
        - cookieAuth: []
        - csrfToken: []
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/EvidenceId"
      responses:
        "200": { $ref: "#/components/responses/GenericSuccess" }
        "403": { $ref: "#/components/responses/PermissionDeniedError" }

  /feed:
    get:
      tags: [Feed]
      summary: Get home feed
      operationId: getFeed
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Cursor-paginated feed.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/Post" }
                      meta: { $ref: "#/components/schemas/CursorMeta" }
        "403": { $ref: "#/components/responses/AccountGateError" }

  /posts:
    post:
      tags: [Feed]
      summary: Create post
      operationId: createPost
      security:
        - cookieAuth: []
        - csrfToken: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema: { $ref: "#/components/schemas/PostCreateRequest" }
      responses:
        "201":
          description: Post created.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Post" }

  /posts/{post_id}:
    get:
      tags: [Feed]
      summary: Get post detail
      operationId: getPost
      parameters:
        - $ref: "#/components/parameters/PostId"
      responses:
        "200":
          description: Post detail.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Post" }
        "404": { $ref: "#/components/responses/NotFoundError" }
    patch:
      tags: [Feed]
      summary: Update own post
      operationId: updatePost
      security:
        - cookieAuth: []
        - csrfToken: []
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PostId"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                body: { type: string, maxLength: 5000 }
                visibility: { $ref: "#/components/schemas/PostVisibility" }
      responses:
        "200":
          description: Post updated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Post" }
    delete:
      tags: [Feed]
      summary: Delete own post
      operationId: deletePost
      security:
        - cookieAuth: []
        - csrfToken: []
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PostId"
      responses:
        "200": { $ref: "#/components/responses/GenericSuccess" }

  /posts/{post_id}/comments:
    get:
      tags: [Comments]
      summary: List comments for post
      operationId: listComments
      parameters:
        - $ref: "#/components/parameters/PostId"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Comments.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/Comment" }
                      meta: { $ref: "#/components/schemas/CursorMeta" }
    post:
      tags: [Comments]
      summary: Create comment
      operationId: createComment
      security:
        - cookieAuth: []
        - csrfToken: []
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PostId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body: { type: string, minLength: 1, maxLength: 2000 }
                parent_comment_id: { type: integer, format: int64, nullable: true }
      responses:
        "201":
          description: Comment created.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Comment" }

  /comments/{comment_id}:
    patch:
      tags: [Comments]
      summary: Update comment
      operationId: updateComment
      security:
        - cookieAuth: []
        - csrfToken: []
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CommentId"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body: { type: string, minLength: 1, maxLength: 2000 }
      responses:
        "200":
          description: Comment updated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Comment" }
    delete:
      tags: [Comments]
      summary: Delete comment
      operationId: deleteComment
      security:
        - cookieAuth: []
        - csrfToken: []
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CommentId"
      responses:
        "200": { $ref: "#/components/responses/GenericSuccess" }

  /discovery:
    get:
      tags: [Discovery]
      summary: Get discovery recommendations
      operationId: getDiscovery
      parameters:
        - name: filter[faculty_id]
          in: query
          schema: { type: integer, format: int64 }
        - name: filter[role_type]
          in: query
          schema: { $ref: "#/components/schemas/RoleType" }
        - name: q
          in: query
          schema: { type: string }
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Discovery recommendations.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/UserSummary" }
                      meta: { $ref: "#/components/schemas/CursorMeta" }

  /discovery/{user_id}/pass:
    post:
      tags: [Discovery]
      summary: Pass discovery profile
      operationId: passDiscoveryProfile
      security:
        - cookieAuth: []
        - csrfToken: []
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200": { $ref: "#/components/responses/GenericSuccess" }

  /greetings:
    get:
      tags: [Greeting]
      summary: List greetings
      operationId: listGreetings
      parameters:
        - name: filter[direction]
          in: query
          schema: { type: string, enum: [sent, received] }
        - name: filter[status]
          in: query
          schema: { $ref: "#/components/schemas/GreetingStatus" }
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Greetings.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/Greeting" }
                      meta: { $ref: "#/components/schemas/PageMeta" }
    post:
      tags: [Greeting]
      summary: Send greeting
      operationId: sendGreeting
      security:
        - cookieAuth: []
        - csrfToken: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [receiver_id, message]
              properties:
                receiver_id: { type: integer, format: int64 }
                message: { type: string, minLength: 1, maxLength: 300 }
      responses:
        "201":
          description: Greeting sent.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Greeting" }
        "409": { $ref: "#/components/responses/ConflictError" }

  /greetings/{greeting_id}/accept:
    post:
      tags: [Greeting, Connection, Messaging]
      summary: Accept greeting and create connection/conversation
      operationId: acceptGreeting
      security:
        - cookieAuth: []
        - csrfToken: []
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/GreetingId"
      responses:
        "200":
          description: Greeting accepted.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          greeting: { $ref: "#/components/schemas/Greeting" }
                          connection: { $ref: "#/components/schemas/Connection" }
