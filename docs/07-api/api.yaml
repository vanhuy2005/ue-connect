          type: array
          items: { $ref: "#/components/schemas/MentorProfile" }
        pathways:
          type: array
          items: { $ref: "#/components/schemas/CareerPathway" }
        resources:
          type: array
          items: { $ref: "#/components/schemas/CommunityResource" }

