name: Deploy Azure VM

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed

concurrency:
  group: deploy-azure-vm
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and restart container on VM
    runs-on: ubuntu-latest
    environment: production
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_DIR: /opt/ueconnect
          APP_PORT: "10000"
          GIT_REF: ${{ github.event.workflow_run.head_sha || github.sha }}
          REPOSITORY: ${{ github.repository }}
          DOMAIN: ueconnect.io.vn
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          port: 22
          script_stop: true
          envs: APP_DIR,APP_PORT,GIT_REF,REPOSITORY,DOMAIN
          script: |
            set -eu

            APP_DIR="${APP_DIR:-/opt/ueconnect}"
            APP_PORT="${APP_PORT:-10000}"
            DOMAIN="${DOMAIN:-ueconnect.io.vn}"
            IMAGE_TAG="ueconnect:${GIT_REF}"
            CONTAINER_NAME="ueconnect"

            if [ ! -d "$APP_DIR/.git" ]; then
              echo "Repository is not cloned at $APP_DIR"
              exit 1
            fi

            cd "$APP_DIR"

            git fetch --prune origin main
            git reset --hard "$GIT_REF"

            test -f .env.production || {
              echo "$APP_DIR/.env.production is missing"
              exit 1
            }

            docker build --tag "$IMAGE_TAG" .

            docker run --rm "$IMAGE_TAG" sh -lc 'test -f public/build/manifest.json'
            docker run --rm "$IMAGE_TAG" sh -lc 'find public/build/assets -type f -name "*.css" | grep -q .'
            docker run --rm "$IMAGE_TAG" sh -lc 'find public/build/assets -type f -name "*.js" | grep -q .'

            docker rm -f "$CONTAINER_NAME" 2>/dev/null || true

            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              --env-file .env.production \
              -e PORT=10000 \
              -p "127.0.0.1:${APP_PORT}:10000" \
              "$IMAGE_TAG"

            echo "Waiting for app to become ready..."
            for i in $(seq 1 30); do
              if curl -fsSI "http://127.0.0.1:${APP_PORT}" >/dev/null 2>&1; then
                echo "App responded after $((i * 2))s"
                break
              fi
              sleep 2
            done

            docker ps --filter "name=${CONTAINER_NAME}" --filter "status=running" | grep "$CONTAINER_NAME"

            docker exec -w /var/www/html "$CONTAINER_NAME" sh -lc 'test -f public/build/manifest.json'
            docker exec -w /var/www/html "$CONTAINER_NAME" sh -lc 'find public/build/assets -type f -name "*.css" | grep -q .'
            docker exec -w /var/www/html "$CONTAINER_NAME" sh -lc 'find public/build/assets -type f -name "*.js" | grep -q .'

            CSS_FILE="$(docker exec -w /var/www/html "$CONTAINER_NAME" php -r 'echo json_decode(file_get_contents("public/build/manifest.json"), true)["resources/css/app.css"]["file"] ?? "";')"

            if [ -z "$CSS_FILE" ]; then
              echo "ERROR: CSS entry not found in Vite manifest."
              docker exec -w /var/www/html "$CONTAINER_NAME" cat public/build/manifest.json
              exit 1
            fi

            curl -fsSI "http://127.0.0.1:${APP_PORT}/build/${CSS_FILE}" >/dev/null

            sudo nginx -t
            sudo systemctl is-active --quiet nginx

            if sudo ss -tulpn | grep -E 'docker-proxy.*0\.0\.0\.0:80|docker-proxy.*:443'; then
              echo "Docker must not bind public 80/443. Host Nginx owns those ports."
              exit 1
            fi

            curl -fsSIk --resolve "${DOMAIN}:443:127.0.0.1" "https://${DOMAIN}" >/dev/null
            curl -fsSIk --resolve "${DOMAIN}:443:127.0.0.1" "https://${DOMAIN}/build/${CSS_FILE}" >/dev/null

            echo "Extracting Reverb Key..."
            REVERB_APP_KEY="$(grep '^REVERB_APP_KEY=' .env.production | cut -d '=' -f2- | tr -d '\"' | tr -d "'" | tr -d '\r')"

            if [ -z "$REVERB_APP_KEY" ]; then
              echo "ERROR: REVERB_APP_KEY is missing in .env.production"
              exit 1
            fi

            echo "Testing Laravel Reverb WebSocket with real Node client..."

            docker exec \
              -e REVERB_APP_KEY="$REVERB_APP_KEY" \
              -e APP_PORT="$APP_PORT" \
              ueconnect \
              node - <<'NODE'
            const appKey = process.env.REVERB_APP_KEY;
            const port = process.env.APP_PORT || '10000';

            const url = `ws://127.0.0.1:${port}/app/${appKey}?protocol=7&client=js&version=8.4.0&flash=false`;

            console.log(`Connecting to ${url.replace(appKey, '[REVERB_APP_KEY]')}`);

            const ws = new WebSocket(url);

            const failTimer = setTimeout(() => {
              console.error('Timed out waiting for pusher:connection_established');
              try { ws.close(); } catch (_) {}
              process.exit(1);
            }, 8000);

            ws.onopen = () => {
              console.log('WebSocket TCP/HTTP upgrade opened');
            };

            ws.onmessage = (event) => {
              const data = String(event.data || '');
              console.log('Received:', data);

              if (data.includes('pusher:connection_established')) {
                clearTimeout(failTimer);
                console.log('Reverb WebSocket connection established successfully.');
                ws.close();
                process.exit(0);
              }
            };

            ws.onerror = (error) => {
              clearTimeout(failTimer);
              console.error('WebSocket error:', error?.message || error);
              process.exit(1);
            };

            ws.onclose = (event) => {
              console.log(`WebSocket closed: code=${event.code}, reason=${event.reason || ''}`);
            };
            NODE

            echo "Local Reverb WebSocket test passed."

            echo "Checking push routes and VAPID keys..."
            docker exec -w /var/www/html "$CONTAINER_NAME" php artisan route:list | grep -Ei 'push|subscription|notification' || true
            docker exec -w /var/www/html "$CONTAINER_NAME" php artisan tinker --execute='if (empty(config("webpush.vapid.public_key")) || empty(config("webpush.vapid.private_key"))) { echo "Missing VAPID keys!\n"; exit(1); } echo "VAPID Keys configuration OK\n";'

            docker image prune -f

            echo "Deploy passed."
            echo "Container: ${CONTAINER_NAME}"
            echo "Docker bind: 127.0.0.1:${APP_PORT}:10000"
            echo "Nginx host owns: 80/443"
            echo "CSS served: /build/${CSS_FILE}"
